name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - ".github/workflows/ci-cd.yaml"
  pull_request:
    branches: ["main"]

env:
  IMAGE_NAME: ${{ github.repository_owner }}/gitops-demo-app

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest app/tests -v

  build-and-scan:
    name: Build image and scan for vulnerabilities
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }} \
                        -t ghcr.io/${{ env.IMAGE_NAME }}:latest \
                        ./app

      # Trivy scans the built image for known CVEs before it's allowed to ship.
      # This is the DevSecOps "shift-left" gate in the pipeline.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0 # set to 1 once you want the pipeline to hard-fail on findings

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
          docker push ghcr.io/${{ env.IMAGE_NAME }}:latest

  update-manifest:
    name: Bump image tag in GitOps manifest (triggers ArgoCD sync)
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set new image tag in dev overlay
        run: |
          cd k8s/overlays/dev
          sed -i "s#newTag: .*#newTag: ${{ needs.build-and-scan.outputs.image_tag }}#" kustomization.yaml

      - name: Commit and push manifest change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/kustomization.yaml
          git commit -m "ci: deploy ${{ needs.build-and-scan.outputs.image_tag }} to dev" || echo "No changes to commit"
          git push
